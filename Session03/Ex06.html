<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table-Rowspan</title>
</head>
<body>
    <table border="1" cellpadding="15" cellspacing="10">
        <!-- Hàng tiêu đề -->
        <thead>
            <tr>
                <th>Loại sản phẩm</th>
                <th>Tên sản phẩm</th>
                <th>Giá</th>
            </tr>
        </thead>
        <tbody>
            <!-- Hàng 1 -->
            <tr>
                <td rowspan="2">Điện tử</td>
                <td>Laptop</td>
                <td>15.000.000</td>
            </tr>

        <!-- Hàng 2 -->
            <tr>
               <td>Điện thoại</td>
               <td>8.000.000</td>
            </tr>

        <!-- Hàng 3 -->
            <tr>
               <td>Gia dụng</td>
               <td>Máy giặt</td>
               <td>5.000.000</td>
            </tr>
        </tbody>
        
    </table>

</body>
</html>
