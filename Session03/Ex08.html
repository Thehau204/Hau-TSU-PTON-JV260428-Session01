<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Liên hệ</title>
</head>
<body>

    <h1>Liên Hệ Với Chúng Tôi</h1>

    <form>
        <!-- Họ và tên -->
        <p>
            Họ và tên:<br>
            <input type="text">
        </p>

        <!-- Email -->
        <p>
            Email:<br>
            <input type="email">
        </p>

        <!-- Tin nhắn -->
        <p>
            Tin nhắn:<br>
            <textarea rows="5" cols="50"></textarea>
        </p>

        <!-- Nút -->
        <p>
            <input type="submit" value="Gửi">
        </p>

    </form>

</body>
</html>
