<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Sở Thích</title>
</head>
<body>
    <form>
        <caption><strong>SỞ THÍCH CỦA BẠN</strong></caption>
        <p>
            <label>Họ và tên</label>
            <input type="text">
        </p>

        <p>
            <label>Email</label>
            <input type="email">
        </p>

        <p>
            <label>Sở thích</label>
            <span class="hobby">
                <input type="checkbox"> <label>Thể thao</label>
                <input type="checkbox"> <label>Âm nhạc</label>
                <input type="checkbox"> <label>Đọc sách</label><br>

                <input type="checkbox"> <label>Lướt web</label>
                <input type="checkbox"> <label>Chơi game</label>
                <input type="checkbox"> <label>Điện ảnh</label><br>

                <input type="checkbox"> <label>Du lịch</label>
            </span>
        </p>

        <div class="buttons">
            <input type="submit" value="Gửi thông tin">
            <input type="reset" value="Nhập lại">
        </div>
    </form>
</div>

</body>
</html>
