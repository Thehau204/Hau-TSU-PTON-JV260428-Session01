<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tìm kiếm sản phẩm</title>
</head>
<body>

    <h1>Tìm Kiếm Sản Phẩm</h1>

    <form>
        <!-- Từ khóa -->
        <p>
            Từ khóa tìm kiếm:<br>
            <input type="text">
        </p>

        <!-- Loại sản phẩm -->
        <p>
            Loại sản phẩm:<br>
            <select>
                <option>Điện tử</option>
                <option>Gia dụng</option>
                <option>Thời trang</option>
                <option>Sách</option>
            </select>
        </p>

        <!-- Nút tìm -->
        <p>
            <input type="submit" value="Tìm kiếm">
        </p>
    </form>

</body>
</html>
