<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h1 {
      font-style: italic;
    }
    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 600px;
    }
    img {
      width: 150px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <h1>My Store</h1>

  <table border="2">
    <tr>
      <th>Item Photo</th>
      <th>Name</th>
      <th>Price</th>
    </tr>

    <tr>
      <td><img src="./img/ranges.png" alt="Oranges"></td>
      <td>Oranges</td>
      <td>$1 ea.</td>
    </tr>

    <tr>
      <td><img src="./img/Bananas.jpg" alt="Bananas"></td>
      <td>Bananas</td>
      <td>$0.75/lb</td>
    </tr>

    <tr>
      <td><img src="./img/pomegranates.png" alt="Pomegranates"></td>
      <td>Pomegranates</td>
      <td>3 for $5</td>
    </tr>

    <tr>
      <td><img src="./img/gummybear.jpg" alt="Gummy Bears"></td>
      <td>Gummy Bears</td>
      <td>$6 per bag</td>
    </tr>

    <tr>
      <td><img src="./img/broccoli.png" alt="Broccoli"></td>
      <td>Broccoli</td>
      <td>$3 a head</td>
    </tr>
  </table>
  <!-- Booking Form -->
  <h1>Booking Form</h1>
  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone"><br><br>

    <label for="date">Date:</label>
    <input type="date" id="date" name="date"><br><br>

    <label for="time">Time:</label>
    <input type="time" id="time" name="time"><br><br>

    <label for="guests">Number of Guests:</label>
    <input type="number" id="guests" name="guests"><br><br>

    <button type="submit">Submit</button>
  </form>
  <h1>Car Purchase Form</h1>
  <form action="#" method="post">
        <!-- Name -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <!-- Phone -->
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone"><br><br>

        <!-- Choose a Car -->
        <label for="car">Choose a Car:</label>
        <select id="car" name="car">
            <option value="model1">Model 1</option>
            <option value="model2">Model 2</option>
            <option value="model3">Model 3</option>
        </select><br><br>

        <!-- Choose a Color -->
        <label for="color">Choose a Color:</label>
        <select id="color" name="color">
            <option value="red">Red</option>
            <option value="black">Black</option>
            <option value="white">White</option>
        </select><br><br>

        <!-- Quantity -->
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" min="1"><br><br>

        <!-- Delivery Date -->
        <label for="delivery">Delivery Date:</label>
        <input type="date" id="delivery" name="delivery"><br><br>

        <!-- Submit -->
        <button type="submit">Submit</button>

</body>
</form>
</html>
