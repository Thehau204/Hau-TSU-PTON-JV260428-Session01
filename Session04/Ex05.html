<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập CSS</title>

    <!-- Internal Style -->
    <style>
        .internal-text {
            color: rgb(15, 104, 206);
        }
    </style>

    <!-- External Style -->
    <link rel="stylesheet" href="./css/Ex05.css">
</head>
<body>

    <!-- Inline Style -->   
    <h1 style="color: rgb(240, 186, 10);">What is CSS?</h1>

    <!-- Internal Style -->
    <p class="internal-text">
        <strong>Cascading Style Sheets (CSS)</strong> is used to format the layout of a webpage.
    </p>

    <!-- External Style -->
    <p class="external-text">
        With CSS, you can control the color, font, the size of text, the spacing between elements,
        how elements are positioned and laid out, background images, and much more!
    </p>

</body>
</html>
